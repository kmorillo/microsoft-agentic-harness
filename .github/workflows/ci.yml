name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Provision Postgres so the Infrastructure.Observability integration tests actually
    # execute instead of skipping. The credentials and database name match the fixture's
    # DefaultConnectionString (Database/Username/Password = "observability"). Setting
    # OBSERVABILITY_TEST_CONN below also flips the fixture into "explicitly configured"
    # mode, so any connectivity failure surfaces as a hard error rather than a silent skip.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: observability
          POSTGRES_USER: observability
          POSTGRES_PASSWORD: observability
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U observability -d observability"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      OBSERVABILITY_TEST_CONN: "Host=localhost;Port=5432;Database=observability;Username=observability;Password=observability"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # The schema scripts are normally applied by docker-entrypoint-initdb.d, which is
      # unavailable to GitHub Actions service containers. Apply them in lexical order via
      # psql once the service is healthy so the observability tables exist before tests run.
      - name: Apply observability schema
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for f in Dashboards/init-db/*.sql; do
            echo "Applying $f"
            PGPASSWORD=observability psql -h localhost -p 5432 -U observability -d observability -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Restore
        run: dotnet restore src/AgenticHarness.slnx

      - name: Build
        run: dotnet build src/AgenticHarness.slnx --no-restore --configuration Release

      - name: Unit and integration tests
        run: >
          dotnet test src/AgenticHarness.slnx
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  owasp-agentic-gate:
    name: OWASP Agentic Top-10 Gate
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/AgenticHarness.slnx

      - name: Build
        run: dotnet build src/AgenticHarness.slnx --no-restore --configuration Release

      - name: Run OWASP Agentic eval fixtures (hard gate)
        # Any Verdict.Fail causes a non-zero exit code and blocks the merge.
        # To document a legitimate bypass, add an entry to .github/eval-bypasses.md
        # with the case id, reason, and expiry date — but the gate still runs.
        run: >
          dotnet test
          src/Content/Tests/Application.AI.Common.Tests/Application.AI.Common.Tests.csproj
          --no-build
          --configuration Release
          --filter "Category=OwaspAgentic"
          --logger "trx;LogFileName=owasp-agentic-gate.trx"
          --results-directory owasp-results

      - name: Upload OWASP gate results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-agentic-gate-results
          path: owasp-results/
