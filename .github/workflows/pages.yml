name: Deploy Documentation to GitHub Pages

# Publishes two sites to GitHub Pages:
#   /                          → documentation/onboarding/        (Developer Onboarding Guide)
#   /architecture/             → documentation/architecture/      (Architecture Guide)
#   /agentic-harness-course/   → documentation/agentic-harness-course/ (Interactive Course)
# This layout preserves the existing onboarding URL and matches the
# relative link from onboarding → course (../agentic-harness-course/).
#
# Runs whenever either folder (or this workflow) changes on main.
# Uses the modern "Pages from Actions" source — no gh-pages branch needed.
#
# After this workflow runs successfully for the first time, enable Pages in:
#   Settings → Pages → Source: "GitHub Actions"
# The site URL will appear in the workflow run summary.

on:
  push:
    branches: [main]
    paths:
      - 'documentation/onboarding/**'
      - 'documentation/architecture/**'
      - 'documentation/agentic-harness-course/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish before queuing another.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site contents
        # Onboarding lives at the site root; the interactive course is nested
        # under /agentic-harness-course/ so the existing relative link from
        # the onboarding guide resolves correctly.
        run: |
          mkdir -p _site
          cp -R documentation/onboarding/. _site/
          mkdir -p _site/architecture
          cp -R documentation/architecture/. _site/architecture/
          mkdir -p _site/agentic-harness-course
          cp -R documentation/agentic-harness-course/. _site/agentic-harness-course/

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
