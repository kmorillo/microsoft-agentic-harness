# Prometheus + Grafana for Agentic Harness Dashboards
# Prerequisite: OTel Collector must be running (scripts/otel-collector)
# Usage: docker-compose up -d
# Stop:  docker-compose down

services:
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: agentic-harness-prometheus

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "127.0.0.1:9090:9090"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"

    restart: unless-stopped

    networks:
      - agentic-harness-otel

    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: agentic-harness-postgres

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro

    ports:
      - "127.0.0.1:5432:5432"

    environment:
      - POSTGRES_USER=${POSTGRES_USER:-observability}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}
      - POSTGRES_DB=${POSTGRES_DB:-observability}

    restart: unless-stopped

    networks:
      - agentic-harness-otel

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observability"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  grafana:
    image: grafana/grafana:11.4.0
    container_name: agentic-harness-grafana

    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - "./Grafana Dashboards:/var/lib/grafana/dashboards:ro"
      - grafana-data:/var/lib/grafana

    ports:
      - "127.0.0.1:3000:3000"

    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?Set GF_ADMIN_PASSWORD env var}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/sessions.json

    restart: unless-stopped

    networks:
      - agentic-harness-otel

    depends_on:
      prometheus:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:

networks:
  agentic-harness-otel:
    external: true
